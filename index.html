<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя ❄️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg, #6fb7e9, #dff3ff);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* карточка */
.card {
  background: white;
  padding: 35px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
  max-width: 420px;
  width: 90%;
  position: relative;
  z-index: 2;
}

h1 {
  color: #2c6fb7;
  margin-bottom: 15px;
}

p {
  font-size: 16px;
  color: #444;
  line-height: 1.6;
}

/* горы */
.mountains {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 200px;
  background: linear-gradient(to top, #0d1b2a, transparent);
  clip-path: polygon(
    0% 100%, 
    10% 70%, 
    20% 90%, 
    35% 60%, 
    50% 85%, 
    65% 55%, 
    80% 80%, 
    90% 65%, 
    100% 100%
  );
  z-index: 1;
}

/* сердечки */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 3s linear forwards;
}

@keyframes float {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-200px) scale(1.5);
    opacity: 0;
  }
}

/* снежинки */
.snowflake {
  position: fixed;
  top: -10px;
  color: white;
  font-size: 12px;
  opacity: 0.8;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}

</style>
</head>

<body>

<div class="card" id="card">
  <h1>Спокойной ночи ⛷️🌙</h1>

  <p>
    Надеюсь, ты отлично покатался сегодня  
    и получил свою порцию гор, снега и адреналина ❄️
  </p>

  <p>
    Пусть тебе снятся красивые спуски,  
    мягкий снег и идеальная погода в горах 🏔️
  </p>

  <p>
    А я просто отправляю тебе немного тепла  
    из другой страны 💙
  </p>

  <p style="font-size:14px; opacity:0.7; margin-top:20px;">
нажми на открытку
</p>
  
</div>

<div class="mountains"></div>

<script>

/* снежинки */
function createSnowflake(){
  const snow = document.createElement("div");
  snow.className = "snowflake";
  snow.innerHTML = "❄";
  snow.style.left = Math.random()*100 + "vw";
  snow.style.animationDuration = 3 + Math.random()*5 + "s";
  snow.style.fontSize = 10 + Math.random()*20 + "px";

  document.body.appendChild(snow);

  setTimeout(()=>snow.remove(),8000);
}

setInterval(createSnowflake,200);

/* сердечки */
const card = document.getElementById("card");

card.addEventListener("click", () => {
  for(let i=0;i<8;i++){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💙";

    heart.style.left = (card.offsetWidth/2 + (Math.random()*80-40)) + "px";
    heart.style.top = (card.offsetHeight/2) + "px";

    card.appendChild(heart);

    setTimeout(()=>heart.remove(),3000);
  }
});

</script>

</body>
</html>
